---
# CodeRabbit Configuration for DEMO Repository
# This configuration enables automated test case generation and quality tracking

coderabbit:
  # Enable CodeRabbit features
  enabled: true
  
  # Review settings
  review:
    # Enable automatic review on PRs
    auto_review: true
    # Review only changed lines
    review_comment_levels: "changed"
    # Maximum review comments per file
    max_comment_per_file: 10
    # Collapse review comments
    collapse_review: true
    # Review tools to enable
    tools:
      - ast
      - tiktoken
      - soundness
    # Tone of review
    tone: "conversational"

  # Language specific configurations
  language_support:
    - javascript
    - html
    - css

  # Test case generation settings (frontend only)
  test_generation:
    enabled: true
    # Auto-generate test cases for new functions
    auto_generate: true
    # Test framework (manual/suggested by CodeRabbit)
    framework: "manual"
    # Coverage threshold (suggested)
    coverage_threshold: 80
    # Generate tests for these patterns
    patterns:
      - "*.js"
      - "*.html"
    # Exclude paths
    exclude_paths:
      - "node_modules/**"
      - "dist/**"
      - "build/**"
      - ".next/**"

  # Quality metrics and KPIs
  quality_metrics:
    enabled: true
    
    # Code Quality Analysis
    code_quality:
      enabled: true
      rules:
        - complexity: "high"
        - maintainability: "low"
        - duplication: "high"
      thresholds:
        cyclomatic_complexity: 15
        cognitive_complexity: 20
        maintainability_index: 50
    
    # Performance Metrics (frontend)
    performance:
      enabled: true
      track:
        - load_time
        - memory_usage
        - dom_interactions
      thresholds:
        load_time_ms: 3000
        memory_usage_mb: 256
        dom_interactions: 1000
    
    # Business Logic Alignment (UI flow)
    business_logic:
      enabled: true
      checks:
        - ui_consistency: true
        - user_flow: true
        - accessibility: true
        - responsiveness: true
      constraints:
        - must_handle_user_input: true
        - must_provide_feedback: true
        - must_be_accessible: true
        - must_follow_ui_patterns: true
    
    # Test Case Relevance Analysis (frontend)
    test_coverage:
      enabled: true
      minimum_coverage: 80
      track:
        - ui_interactions
        - user_flows
        - edge_cases
      report_missing:
        - untested_ui_states
        - untested_user_paths
        - uncovered_edge_cases
    
  # Report generation
  reports:
    enabled: true
    format: "markdown"
    
    # Generate comprehensive reports
    sections:
      - summary
      - frontend_quality_metrics
      - ui_performance_metrics
      - user_flow_coverage
      - accessibility_check
      - recommendations
      - frontend_kpi_dashboard
    
    # KPI definitions (frontend focused)
    kpis:
      frontend_quality:
        - metric: "Cyclomatic Complexity"
          target: "< 15"
          importance: "critical"
        - metric: "Maintainability Index"
          target: "> 50"
          importance: "high"
        - metric: "Code Duplication"
          target: "< 5%"
          importance: "medium"
      
      frontend_performance:
        - metric: "Page Load Time"
          target: "< 3 seconds"
          importance: "critical"
        - metric: "DOM Interactions"
          target: "< 1000"
          importance: "high"
        - metric: "Memory Usage"
          target: "< 256 MB"
          importance: "medium"
      
      ui_coverage:
        - metric: "UI State Coverage"
          target: "> 80%"
          importance: "critical"
        - metric: "User Flow Coverage"
          target: "> 85%"
          importance: "high"
        - metric: "Accessibility Compliance"
          target: "100%"
          importance: "critical"

  # Workflow triggers
  triggers:
    on_pull_request: true
    on_push: true
    on_branch:
      - "**"
    exclude_branches:
      - "release/**"

  # Integration settings (frontend focus)
  integrations:
    slack:
      enabled: true
      notify_on: 
        - ui_issue_detected
        - performance_degradation
        - accessibility_violation
    github:
      enabled: true
      comment_on_pr: true
      check_run: true
      status_check: true

  # Constraints and Rules (frontend)
  constraints:
    must_pass_ui_tests: true
    must_meet_accessibility: true
    must_improve_performance: false
    must_not_increase_complexity: true
    must_document_ui_changes: true
    require_ui_review: true
    
    # Blocking rules
    blocking:
      - rule: "accessibility"
        threshold: 95
        action: "block"
      - rule: "ui_performance"
        threshold: 3000
        action: "warn"
      - rule: "code_quality"
        threshold: 50
        action: "block"

  # Auto-fix configuration (frontend)
  autofix:
    enabled: true
    auto_commit: false
    suggestions:
      - simplify_ui_logic
      - fix_accessibility_issues
      - improve_performance
      - add_ui_tests

  # Logging and debugging
  logging:
    level: "info"
    detailed_report: true
    track_frontend_metrics: true
